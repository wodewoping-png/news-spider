name: News Summaries

on:
  schedule:
    - cron: "30 16 * * 0"
    - cron: "0 17 1 * *"
  workflow_dispatch:
    inputs:
      task:
        description: "Summary task to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - weekly
          - monthly
      week:
        description: "Optional ISO week, for example 2026-W23"
        required: false
        type: string
      month:
        description: "Optional month, for example 2026-06"
        required: false
        type: string

concurrency:
  group: news-summaries-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  weekly:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.task == 'weekly' || github.event.inputs.task == 'all') ||
      github.event.schedule == '30 16 * * 0'
    env:
      PYTHONUTF8: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate weekly summary
        run: |
          if [ -n "${{ github.event.inputs.week }}" ]; then
            python weekly_aggregate.py --week "${{ github.event.inputs.week }}"
          else
            python weekly_aggregate.py
          fi

      - name: Commit weekly summary
        run: |
          branch="${GITHUB_REF_NAME:-$(git branch --show-current)}"
          if [ -z "$branch" ]; then
            branch="${{ github.event.repository.default_branch }}"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data/weekly
          if git diff --cached --quiet; then
            echo "No weekly summary changes to commit."
          else
            git commit -m "chore: update weekly news summary"
            git pull --rebase --autostash origin "$branch"
            git push origin "HEAD:$branch"
          fi

  monthly:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.task == 'monthly' || github.event.inputs.task == 'all') ||
      github.event.schedule == '0 17 1 * *'
    env:
      PYTHONUTF8: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate monthly summary
        run: |
          if [ -n "${{ github.event.inputs.month }}" ]; then
            python monthly_news_stats.py --month "${{ github.event.inputs.month }}"
          else
            python monthly_news_stats.py
          fi

      - name: Commit monthly summary
        run: |
          branch="${GITHUB_REF_NAME:-$(git branch --show-current)}"
          if [ -z "$branch" ]; then
            branch="${{ github.event.repository.default_branch }}"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data/monthly
          if git diff --cached --quiet; then
            echo "No monthly summary changes to commit."
          else
            git commit -m "chore: update monthly news summary"
            git pull --rebase --autostash origin "$branch"
            git push origin "HEAD:$branch"
          fi
